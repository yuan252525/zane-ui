color-extra-light);"> <zane-rate value="3" clearable="" allow-half="" show-score=""></zane-rate> <zane-rate value="3" size="small" clearable="" allow-half="" show-score=""></zane-rate> </div> <div style="padding: 20px; margin-top: 24px; border: 1px solid var(--zane-border-color-extra-light);"> <zane-mention value="@" placeholder="Please input" style="width: 320px;"></zane-mention></div> <div style="padding: 20px; margin-top: 24px; border: 1px solid var(--zane-border-color-extra-light);"> <zane-input-tag placeholder="Please input" aria-label="Please click the Enter key after input"></zane-input-tag> </div> <div style="padding: 20px; margin-top: 24px; border: 1px solid var(--zane-border-color-extra-light);"> <div> <zane-radio-group value="radio1"> <zane-radio value="1" size="large">Option 1</zane-radio> <zane-radio value="2" size="large">Option 2</zane-radio> </zane-radio-group> </div> <div> <zane-radio-group value="radio" size="large" fill="#409eff"> <zane-radio-button label="New York" value="New York"></zane-radio-button> <zane-radio-button label="Washington" value="Washington"></zane-radio-button> <zane-radio-button label="Los Angeles" value="Los Angeles"></zane-radio-button> <zane-radio-button label="Chicago" value="Chicago"></zane-radio-button> </zane-radio-group> </div> </div> <div style="padding: 20px; margin-top: 24px; border: 1px solid var(--zane-border-color-extra-light);"> <zane-input-number value="1" min="1" max="10" precision="2" step="0.1" controls-position="right"></zane-input-number> </div> <script>

      // ------ start mention ----------------------------------
      var mentionEl = document.querySelector('zane-mention');
      if (mentionEl) {
        mentionEl.options = [
          {
            label: 'Fuphoenixes',
            value: 'Fuphoenixes',
          },
          {
            label: 'kooriookami',
            value: 'kooriookami',
          },
          {
            label: 'Jeremy',
            value: 'Jeremy',
          },
          {
            label: 'btea',
            value: 'btea',
          },
        ];
      }

      // ------ start select ----------------------------------
      var selectEl = document.querySelector('#selectVirtual01');
      if (selectEl) {
        const initials = ['a', 'b', 'c', 'd', 'e', 'f', 'g', 'h', 'i', 'j'];
        const options = Array.from({ length: 1000 }).map((_, idx) => ({
          value: `Option ${idx + 1}`,
          label: `${initials[idx % 10]}${idx}`,
        }));
        selectEl.options = options;
      }

      // ------ start transfer ----------------------------------
      var transfer01El = document.querySelector('#transfer01');
      if (transfer01El) {
        const data = []
        for (let i = 1; i <= 15; i++) {
          data.push({
            key: i,
            label: `Option ${i}`,
            disabled: i % 4 === 0,
          })
        }
        transfer01El.data = data;
      }
      // ------ start tree ----------------------------------

      const props = {
        value: 'id',
        label: 'label',
        children: 'children',
      };

      const getKey = (prefix, id) => {
        return `${prefix}-${id}`
      };

      function createData(
        maxDeep,
        maxChildren,
        minNodesNumber,
        deep = 1,
        key = 'node'
      ) {
        let id = 0
        return Array.from({ length: minNodesNumber })
          .fill(deep)
          .map(() => {
            const childrenNumber =
              deep === maxDeep ? 0 : Math.round(Math.random() * maxChildren)
            const nodeKey = getKey(key, ++id)
            return {
              id: nodeKey,
              label: nodeKey,
              children: childrenNumber
                ? createData(maxDeep, maxChildren, childrenNumber, deep + 1, nodeKey)
                : undefined,
            }
          })
      }

      var tree01El = document.querySelector('#tree01');
      if (tree01El) {
        tree01El.data = createData(4, 30, 40);
        tree01El.props = props;
      }

      // ---  start autocomplete ---------------------
      var autocomplete01 = document.querySelector('#autocomplete01')
      if (autocomplete01) {
        const restaurants = [
          { value: 'vue', link: 'https://github.com/vuejs/vue' },
          { value: 'element', link: 'https://github.com/ElemeFE/element' },
          { value: 'cooking', link: 'https://github.com/ElemeFE/cooking' },
          { value: 'mint-ui', link: 'https://github.com/ElemeFE/mint-ui' },
          { value: 'vuex', link: 'https://github.com/vuejs/vuex' },
          { value: 'vue-router', link: 'https://github.com/vuejs/vue-router' },
          { value: 'babel', link: 'https://github.com/babel/babel' },
        ];

        const createFilter = (queryString) => {
          return (restaurant) => {
            return (
              restaurant.value.toLowerCase().indexOf(queryString.toLowerCase()) === 0
            )
          }
        }

        const querySearch = (queryString, cb) => {
          const results = queryString
            ? restaurants.filter(createFilter(queryString))
            : restaurants
          // call callback function to return suggestions
          cb(results)
        }

        autocomplete01.fetchSuggestions = querySearch;
      }

      // --- start select -------------------------
      var treeSelect01 = document.querySelector('#treeSelect01')
      if (treeSelect01) {
        treeSelect01.data = createData(4, 30, 40);
        treeSelect01.props = props;
      }
    </script> <script>

}
